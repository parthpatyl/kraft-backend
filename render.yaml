# Render Blueprint for deploying Kraft Backend with PostgreSQL in the same service
services:
  - type: web
    name: kraft-backend
    env: docker
    dockerfilePath: kraft-backend/Dockerfile
    dockerContext: kraft-backend
    # Note: Persistent disks require a paid plan (starter, standard, etc.).
    # If you want to use the Free tier, change plan to 'free' and comment out or remove the 'disk' section.
    # (Be aware that on the Free plan, database data will reset every time the container restarts or redeploys).
    plan: starter 
    healthCheckPath: /health
    disk:
      name: pg-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
